# Production deployment for mohe.today/todly.
#
# Fronted by the shared Caddy reverse proxy (container `proxy-caddy` on the
# external `proxy_network`). Only `todly-api` and `todly-web` join that network
# so Caddy can route to them by name; Postgres/Redis stay on the private
# `todly_internal` network and publish no host ports.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# The web image is built with VITE_BASE_PATH=/todly/ so all asset/router/API
# URLs are prefixed; Caddy strips the /todly prefix before forwarding.

services:
  db:
    image: postgres:16
    container_name: todly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: todly
      POSTGRES_USER: todly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todly_prod_pw_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todly"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - todly_internal

  redis:
    image: redis:7
    container_name: todly-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - todly_internal

  api:
    build: ./apps/api
    container_name: todly-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Korea-only product: run the JVM in KST so HomeService greeting
      # (phraseForHour) and LocalDate.now()-based "today"/due dates match the
      # user's wall clock instead of the container's UTC default.
      TZ: Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/todly
      SPRING_DATASOURCE_USERNAME: todly
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-todly_prod_pw_change_me}
      SPRING_DATA_REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-9rV/iHD75blihUcAqvLxsk+0ctJfG97f8fHTMnIaze19cOePzJrXhiKT70IHxCpW}
      TODLY_STORAGE_DIR: /app/data/photos
      # Native push (FCM/APNs) — Firebase Admin service account for project
      # todly-a8c34. Mounted read-only from ./apps/api/secrets (gitignored).
      TODLY_PUSH_FCM_CREDENTIALS: /app/secrets/todly-fcm-service-account.json
    volumes:
      - photos:/app/data/photos
      - ./apps/api/secrets:/app/secrets:ro
    networks:
      - todly_internal
      - proxy_network

  # Serves the pre-built static bundle straight from the host's apps/web/dist
  # (mounted read-only) — so a web deploy is just `npm run build` on the host,
  # no image rebuild. Build with the /todly base + api/ws URLs baked in:
  #   cd apps/web && VITE_BASE_PATH=/todly/ VITE_API_BASE_URL=/todly/api/v1 \
  #     VITE_WS_URL=/todly/ws npm run build      (or: scripts/deploy-web.sh)
  # nginx serves the new files immediately; no container restart needed.
  web:
    image: nginx:alpine
    container_name: todly-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy_network

volumes:
  pgdata:
  photos:

networks:
  todly_internal:
    driver: bridge
  proxy_network:
    external: true
    name: proxy_network
