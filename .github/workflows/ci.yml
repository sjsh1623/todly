# CI for the todly monorepo.
# - api: Spring Boot (Java 21) build + tests. Testcontainers (postgres:16, redis)
#   run against the Docker daemon preinstalled on GitHub-hosted ubuntu runners.
# - web: React + TS + Vite build + Vitest (non-watch).
# Jobs are independent so api/web run in parallel.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    name: API (Spring Boot, Java 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build and test
        working-directory: apps/api
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

  web:
    name: Web (React + Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install, build and test
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npm test -- --run
